services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./vector_store:/app/vector_store

  ui:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    environment:
      - API_URL=http://api:8080
    volumes:
      - ./data:/app/data
      - ./vector_store:/app/vector_store